# swiftii-system.cfg — ld65 config for the ProDOS SYS-format binary.
#
# Produces the lite interpreter — SWIFTIIP.SYSTEM (II+ disk) or, with
# -DWITH_IIE, SWIFTIIE.SYSTEM (//e disk); the SWIFTSAT/SWIFTAUX extras
# binaries have their own *-system.cfg). Loads at $2000 and the
# first byte of the file has
# to be the first instruction of STARTUP. cc65's stock apple2-
# system.cfg drops a 58-byte EXEHDR ahead of STARTUP — that EXEHDR is
# metadata, not code, and on the John Brooks ProDOS 2.4.3 build it
# ends up *executed* (the first byte is $00 = BRK), trapping straight
# to the monitor before main() can run. This config omits the EXEHDR;
# AppleCommander records the SYS file type and a $2000 AUX type at
# -p time, which is what ProDOS reads for auto-launch.
#
# On the .po, neither interpreter is the directly-launched file —
# the boot launcher (installed as SWIFTII.SYSTEM) runs first and chains
# to one of these via MLI OPEN/READ/CLOSE. See tools/apple2/boot_launcher/.
#
# See docs/contributing/LESSONS.md § "ProDOS SYS file load address" for the full incident.

# Memory ceilings for a ProDOS SYS file running without BASIC.SYSTEM:
#   $BF00 = ProDOS global page (only hard boundary in main RAM)
SYMBOLS {
    # cc65 C software stack. Reduced from 2 KB to make room
    # for the raised BSS budgets (FILE_SRC_SIZE 2 KB, FILE_BC_SIZE 1 KB,
    # wider symbol tables). Our deepest C call paths are the Pratt
    # parser (~10 frames) and the VM dispatch loop, both shallow; 1 KB
    # is comfortably above measured peak usage. The forbidden-recursion
    # rule in docs/contributing/CONSTRAINTS.md § 5 caps user-program recursion at 4 levels
    # anyway, which doesn't touch the C stack (the VM uses its own
    # software stack).
    __STACKSIZE__: type = weak, value = $0400;
    # Language card bank 1 RAM, $D400-$F7FF (9 KB
    # commit 2). Holds the compile-time / driver code (compiler,
    # REPL driver, file_runner, meta-commands) and persistent
    # support state. The VM dispatch loop, lexer, value-system
    # runtime, and platform I/O stay in main-RAM CODE for cache-
    # warm hot-path execution. cc65's startup copies the LC
    # segment from MAIN into the language card and switches the
    # LC bank in at boot; calls from CODE into LC are normal
    # JSR-to-RAM (no bank-switch overhead). The 9 KB ceiling
    # leaves room for Tier 2 compile-time features
    # (`struct` / `switch`) before requiring the bank-2 split
    # planned. Earlier builds sized this at
    # $0C00; the bump to $2400 reclaims ~5 KB of main-RAM BSS
    # headroom that the function-call machinery needs.
    # Commit 5: __LCADDR__ moved from $D200 to $D000 (and
    # __LCSIZE__ enlarged from $2600 to $2800) to fit array compile-
    # time code. cc65's apple2.cfg comment refers to $D000-$D3FF as
    # "behind quit code" but ProDOS's QUIT machinery lives in the
    # $BF00 global page (MLI dispatch), not in the language card RAM
    # at $D000+. Empirically the full $D000-$F7FF (10 KB) is usable
    # as our LC arena; revisit if real-hardware testing shows
    # otherwise.
    __LCADDR__:    type = weak, value = $D000;
    __LCSIZE__:    type = weak, value = $2800;
}
MEMORY {
    ZP:        file = "", define = yes, start = $0080,         size = $001A;
    # SwiftII zero page claim. $D0-$DF (16 bytes)
    # for the VM's hot variables: pc, sp, fp, scratch pointers,
    # heap_ptr mirror, op, flags. Per docs/contributing/MEMORY_MAP.md § Zero page and
    # design doc 008 § Commit 4. Slots provisioned by
    # src/vm/zeropage.s. Compatible with ProDOS (reserves $00-$BF for
    # apps but cc65 conventionally uses below $1A; nothing else in
    # tree claims $D0-$DF).
    SWIFTIIZP: file = "", define = yes, start = $00D0,         size = $0010;
    MAIN:      file = %O, define = yes, start = $2000,         size = $BF00 - $2000;
    # BSS ceiling: $BF00 (ProDOS global page) minus cc65 C-stack reserve.
    # Under ProDOS SYS the range $2000-$BEFF is fully ours; $A12D (the
    # BSS end) and the stack top at $B700 are both well within bounds.
    BSS:       file = "",               start = __ONCE_RUN__,  size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    LC:        file = "", define = yes, start = __LCADDR__,    size = __LCSIZE__;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,             type = zp;
    SWIFTIIZP: load = SWIFTIIZP,      type = zp,  optional = yes;
    STARTUP:   load = MAIN,           type = ro;
    LOWCODE:   load = MAIN,           type = ro,  optional = yes;
    CODE:      load = MAIN,           type = ro;
    RODATA:    load = MAIN,           type = ro;
    DATA:      load = MAIN,           type = rw;
    INIT:      load = MAIN,           type = rw;
    ONCE:      load = MAIN,           type = ro,  define   = yes;
    LC:        load = MAIN, run = LC, type = ro,  optional = yes;
    BSS:       load = BSS,            type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
