# swiftsat-system.cfg — ld65 config for SWIFTSAT.SYSTEM (Saturn 128K
# extras binary). Two output files packed by tools/host/diskimg/
# pack_swiftsat.py into a single SYS file with a 4-byte header.
#
# Commit 2 (2026-05-27). Companion design doc:
# docs/contributing/design/011-extras-lc-in-saturn-aux.md.
#
# Layout differs from swiftii-system.cfg only by adding the XLC
# segment for extras-only code that lives in Saturn bank 1
# at runtime (separate physical RAM from the built-in LC where
# ProDOS's MLI body lives, so MLI's code is safe to keep mapped
# during the chunked-staging load).
#
# LC stays on cc65's standard `load = MAIN, run = LC` pattern — LC
# bytes live in the main output file at the cc65-standard offset
# (right after ONCE), and cc65's apple2 crt0.s memcpys them to built-
# in LC bank 2 at startup. The dormant doc-011 attempt to use
# `load = LC, run = LC` is WRONG: cc65's crt0 always runs the LC
# copy, but with load=LC the source offset (__ONCE_LOAD__ +
# __ONCE_SIZE__) points to BSS-area garbage, which crt0 then memcpys
# over the just-loaded LC bytes. We discovered this 2026-05-27 with
# a Mariani crash at $E017 (random execution after LC was clobbered).
# See docs/contributing/LESSONS.md § "cc65 crt0's LC copy is unconditional" for the
# full analysis.
#
# Two loaded regions emitted by ld65:
#   MAIN  (%O.main) — STARTUP/CODE/RODATA/DATA/INIT/ONCE/LC, ~40 KB.
#                     The boot launcher loads this entire blob to $2000+
#                     via one MLI READ. cc65's crt0 handles LC copy.
# XLC (%O.xlc) — extras-only code (asc/chr/Int(s)/
#                     struct/switch/etc.), up to 12 KB. Empty in
#                     stage 1 commits 1+2. Boot launcher chunked-stages
#                     this to Saturn bank 1 via main-RAM scratch
#                     (commit 3+ when first XLC source ships).
#
# `optional = yes` on XLC means the binary still builds even before
# any source is gated to that segment — useful while the XLC
# segment is still empty.

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0400;
    __LCADDR__:    type = weak, value = $D000;
    # Built-in LC bank 2: 10 KB ($D000-$F7FF). Matches the shared
    # swiftii-system.cfg layout — cc65's pratt parser RODATA + tables
    # fit in ~9.9 KB with a bit of headroom.
    __LCSIZE__:    type = weak, value = $2800;
    # Saturn bank 1: 12 KB ($D000-$FBFF). Saturn provides a full
    # 16 KB bank, but we cap at $3000 to leave 1 KB headroom at the
    # top for emulator quirks / Saturn clone variations / future
    # boot-launcher patch tables.
    __XLCADDR__:   type = weak, value = $D000;
    __XLCSIZE__:   type = weak, value = $3000;
}
MEMORY {
    ZP:        file = "",        define = yes, start = $0080,        size = $001A;
    SWIFTIIZP: file = "",        define = yes, start = $00D0,        size = $0010;
    # MAIN is the .main output file. Boot launcher READs it whole into
    # $2000+; cc65's crt0 then memcpys the trailing LC bytes to
    # built-in LC bank 2.
    MAIN:      file = "%O.main", define = yes, start = $2000,        size = $BF00 - $2000;
    BSS:       file = "",                      start = __ONCE_RUN__, size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    # LC is in-MAIN at runtime — cc65 standard `load = MAIN, run = LC`
    # pattern. No separate file output (cc65's crt0 staging + bltu2
    # handle the copy).
    LC:        file = "",        define = yes, start = __LCADDR__,   size = __LCSIZE__;
    # XLC is its own .xlc output file. Boot launcher chunk-stages it
    # through main RAM scratch + memcpy with Saturn bank-1 write
    # enable (commit 3+).
    XLC:       file = "%O.xlc",  define = yes, start = __XLCADDR__,  size = __XLCSIZE__;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,              type = zp;
    SWIFTIIZP: load = SWIFTIIZP,       type = zp,  optional = yes;
    STARTUP:   load = MAIN,            type = ro;
    LOWCODE:   load = MAIN,            type = ro,  optional = yes;
    CODE:      load = MAIN,            type = ro;
    RODATA:    load = MAIN,            type = ro;
    DATA:      load = MAIN,            type = rw;
    INIT:      load = MAIN,            type = rw;
    ONCE:      load = MAIN,            type = ro,  define   = yes;
    # LC standard: bytes in MAIN at offset __ONCE_LOAD__+__ONCE_SIZE__,
    # cc65 startup memcpys to $D000+ in built-in LC bank 2.
    LC:        load = MAIN, run = LC,  type = ro,  optional = yes;
    # XLC: bytes in separate .xlc output; boot launcher copies to Saturn
    # bank 1 at runtime via chunked staging.
    XLC:       load = XLC,  run = XLC, type = ro,  optional = yes;
    BSS:       load = BSS,             type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
