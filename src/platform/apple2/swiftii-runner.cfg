# swiftii-runner.cfg — ld65 config for the MAIN-only Runner.
#
# Same MAIN-only / empty-LC shape as swiftii-compiler.cfg (ProDOS's MLI
# body in the LC bank must survive so the Runner can read BYTECODE.swb and
# chain): an empty 1-byte dummy LC region keeps crt0_ibasic.s's startup LC
# copy a 0-byte no-op, and any `#pragma code-name("LC")` code (none in the
# Runner — it links no pratt/statements) would run in MAIN, not at $D000.
#
# Kept as its own file (not shared with the compiler cfg) so the two tools
# can diverge — e.g. a future aux-resident Runner for HGR — without touching
# the compiler's link map.

# __STACKSIZE__ lowered $0400 -> $0200 (1024 -> 512 B) 2026-06-13 (doc 017):
# BSS overlays ONCE and grows up to ($BF00 - __STACKSIZE__), so the C-stack
# reserve trades directly against BSS. The doc 017 file/dir builtins added
# ~1.6 KB of RAM footprint (vm_file_builtin + the prodos CRUD MLI calls,
# CODE that pushes ONCE up, plus -Cl static locals). Reclaimed from three
# places: the readFile buffer halved to one ProDOS block (USERFILE_READ_CAP
# 512), the heap trimmed 4608->4096, and this 512 B of stack. Cutting the
# C-stack (not the heap) is the safe lever here: the Runner's VM is a flat
# bytecode dispatch loop whose value + call frames live in BSS, so the C
# stack only holds the interpreter's own helper-call chain (vm_run ->
# vm_file_builtin -> userfile_* -> pf_* -> mli, ~5 shallow frames). That
# depth is fixed by the interpreter, NOT by user-program recursion, so
# 512 B is provably sufficient and independent of the program being run.
SYMBOLS {
    __STACKSIZE__: type = weak, value = $0200;
}
MEMORY {
    ZP:        file = "", define = yes, start = $0080,         size = $001A;
    SWIFTIIZP: file = "", define = yes, start = $00D0,         size = $0010;
    MAIN:      file = %O, define = yes, start = $2000,         size = $BF00 - $2000;
    BSS:       file = "",               start = __ONCE_RUN__,  size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    LC:        file = "", define = yes, start = $D400,         size = $0001;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,             type = zp;
    SWIFTIIZP: load = SWIFTIIZP,      type = zp,  optional = yes;
    STARTUP:   load = MAIN,           type = ro;
    LOWCODE:   load = MAIN,           type = ro,  optional = yes;
    CODE:      load = MAIN,           type = ro;
    RODATA:    load = MAIN,           type = ro;
    DATA:      load = MAIN,           type = rw;
    INIT:      load = MAIN,           type = rw;
    # LC before ONCE so the BSS overlay (start = __ONCE_RUN__, grows up)
    # never clobbers it. Empty in the Runner, but kept for parity with the
    # compiler cfg + crt0's symbol references.
    LC:        load = MAIN, run = MAIN, type = ro, optional = yes;
    ONCE:      load = MAIN,           type = ro,  define   = yes;
    BSS:       load = BSS,            type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
