# swiftaux-system.cfg — ld65 config for SWIFTAUX.SYSTEM (Apple //e with
# 64K extended-80-col aux card, no Saturn). Companion design doc:
# docs/contributing/design/011-extras-lc-in-saturn-aux.md § "Stage 2 refresh".
#
# Built -DWITH_SWIFTAUX only (NOT -DWITH_SWIFTSAT): a //e has no Saturn,
# so the runtime uses the aux copy-down trampoline (src/platform/apple2/
# aux_xlc.s), not the Saturn bank-switch one (xlc.s).
#
# Layout vs SWIFTSAT (swiftsat-system.cfg):
#   MAIN  (%O.main)    — STARTUP/CODE/RODATA/DATA/INIT/ONCE/LC, ~40 KB,
#                        loaded to $2000; cc65 crt0 copies the trailing
#                        LC bytes to built-in LC bank 2 (standard).
#   OVL* (%O.ovl.*)    — one copy-down body per distinct XLC dispatcher,
#                        each its own segment + file, all linked to RUN at
#                        __STAGING__ (they overlap — only one is resident at
#                        a time). pack_swiftaux.py lays them out in the aux
#                        park behind a 24-entry directory and records each
#                        body's (offset,len); the runtime trampoline reads
#                        the directory entry for a builtin id and copies
#                        exactly that body down to __STAGING__ per call.
#                        Bodies: asc/chr/call (slice 2); sip/int/rml/rma/con
#                        (step 1, str_interp + Int + the 3 array methods);
#                        pmem/pgr (step 2, the 13 platform builtins fanned
#                        into two id-switch group bodies); scc/nar/aln (step
#                        2, str_concat/new_array/arr_len evicted from inline-
#                        MAIN to fund the platform parser table).
#   XLC   (%O.xlc)      — now EMPTY on the aux build (every XLC dispatcher
#                        has its own overlay). Kept as a defined area so the
#                        single-TU builtins_xlc.c links cleanly; not packed.
#
# __STAGING__ ($B000): the main-RAM buffer a body is copied down into at
# call time — above the BSS top (~$AEDB) and below the cc65 C-stack
# (~$BB00). Proven runnable in slice 0 + emulator-verified slice 2. Each
# overlay AREA is sized to __STAGEMAX__ (the STAGING..C-stack hole) so ld65
# errors if a single body would overrun the C-stack.

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0400;
    __LCADDR__:    type = weak, value = $D000;
    __LCSIZE__:    type = weak, value = $2800;
    __XLCADDR__:   type = weak, value = $D000;
    __XLCSIZE__:   type = weak, value = $3000;
    # Copy-down staging buffer (one body at a time). MUST match aux_xlc.s's
    # JSR target and the boot-launcher loader's park base. See aux_xlc.s header
    # "KEEP IN SYNC".
    __STAGING__:   type = weak, value = $B000;
    # Max copy-down body size = the hole between STAGING ($B000) and the
    # cc65 C-stack bottom ($BF00 - __STACKSIZE__ = $BB00). Slice 3 step 2's
    # packed directory lets a body be any size up to this; ld65 errors if an
    # overlay segment exceeds it. The GR group body (~2.6 KB) is the
    # largest. The C-stack stays within __STACKSIZE__ above $BB00, so it
    # never descends into a body running at STAGING.
    __STAGEMAX__:  type = weak, value = $BF00 - $0400 - $B000;
}
MEMORY {
    ZP:        file = "",        define = yes, start = $0080,        size = $001A;
    SWIFTIIZP: file = "",        define = yes, start = $00D0,        size = $0010;
    MAIN:      file = "%O.main", define = yes, start = $2000,        size = $BF00 - $2000;
    BSS:       file = "",                      start = __ONCE_RUN__, size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    LC:        file = "",        define = yes, start = __LCADDR__,   size = __LCSIZE__;
    XLC:       file = "%O.xlc",  define = yes, start = __XLCADDR__,  size = __XLCSIZE__;
    # Copy-down overlays: each runs at __STAGING__ (they overlap — only one
    # is resident at a time) and emits its own file, capped at __STAGEMAX__.
    # pack_swiftaux.py concatenates the bodies after a 24-entry directory
    # and records each body's (offset,len); the trampoline reads the
    # directory entry for `id` and copies exactly that body down. One body
    # per distinct dispatcher; the 13 platform builtins fan into the two
    # grouped bodies (pmem/pgr), and str_concat/new_array/arr_len are the
    # cold opcode bodies evicted from MAIN (step 2) to fund the platform
    # parser table.
    OVLASC:    file = "%O.ovl.asc",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLCHR:    file = "%O.ovl.chr",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLCALL:   file = "%O.ovl.call", define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLSIP:    file = "%O.ovl.sip",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLINT:    file = "%O.ovl.int",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLRML:    file = "%O.ovl.rml",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLRMA:    file = "%O.ovl.rma",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLCON:    file = "%O.ovl.cnc",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLPMEM:   file = "%O.ovl.pmem", define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLPGR:    file = "%O.ovl.pgr",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLSCC:    file = "%O.ovl.scc",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLNAR:    file = "%O.ovl.nar",  define = yes, start = __STAGING__, size = __STAGEMAX__;
    OVLALN:    file = "%O.ovl.aln",  define = yes, start = __STAGING__, size = __STAGEMAX__;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,                 type = zp;
    SWIFTIIZP: load = SWIFTIIZP,          type = zp,  optional = yes;
    STARTUP:   load = MAIN,               type = ro;
    LOWCODE:   load = MAIN,               type = ro,  optional = yes;
    CODE:      load = MAIN,               type = ro;
    RODATA:    load = MAIN,               type = ro;
    DATA:      load = MAIN,               type = rw;
    INIT:      load = MAIN,               type = rw;
    ONCE:      load = MAIN,               type = ro,  define   = yes;
    LC:        load = MAIN, run = LC,     type = ro,  optional = yes;
    XLC:       load = XLC,  run = XLC,    type = ro,  optional = yes;
    XLCASC:    load = OVLASC,  run = OVLASC,  type = ro, optional = yes;
    XLCCHR:    load = OVLCHR,  run = OVLCHR,  type = ro, optional = yes;
    XLCCALL:   load = OVLCALL, run = OVLCALL, type = ro, optional = yes;
    XLCSIP:    load = OVLSIP,  run = OVLSIP,  type = ro, optional = yes;
    XLCINT:    load = OVLINT,  run = OVLINT,  type = ro, optional = yes;
    XLCRML:    load = OVLRML,  run = OVLRML,  type = ro, optional = yes;
    XLCRMA:    load = OVLRMA,  run = OVLRMA,  type = ro, optional = yes;
    XLCCON:    load = OVLCON,  run = OVLCON,  type = ro, optional = yes;
    XLCPMEM:   load = OVLPMEM, run = OVLPMEM, type = ro, optional = yes;
    XLCPGR:    load = OVLPGR,  run = OVLPGR,  type = ro, optional = yes;
    XLCSCC:    load = OVLSCC,  run = OVLSCC,  type = ro, optional = yes;
    XLCNAR:    load = OVLNAR,  run = OVLNAR,  type = ro, optional = yes;
    XLCALN:    load = OVLALN,  run = OVLALN,  type = ro, optional = yes;
    BSS:       load = BSS,                type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
