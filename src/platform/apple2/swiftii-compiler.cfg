# swiftii-compiler.cfg — ld65 config for the MAIN-only Compiler
# (spike). Derived from swiftii-system.cfg + tools/apple2/boot_launcher/boot_launcher.cfg.
#
# The crux (doc 015): the on-disk Compiler must run with the
# language card LEFT EMPTY so ProDOS's MLI body (in LC bank 1, $D000+)
# survives and the tool can read SOURCE.swift / write BYTECODE.swb / chain
# the Runner — exactly the launcher's MAIN-only trick. So unlike the
# interpreter cfg (which maps the compiler's cold code into the LC at
# $D000, clobbering MLI), this cfg routes the `LC` code-name segment back
# into MAIN (`run = MAIN`). Nothing lands at $D000; MLI is intact.
#
# A 1-byte dummy LC memory region keeps crt0_ibasic.s's __LC_START__ /
# __LC_LAST__ symbols resolvable and makes its startup LC copy a 0-byte
# no-op (same device the launcher cfg uses).

# __STACKSIZE__ lowered $0400 -> $0300 (1024 -> 768 B) 2026-06-13 (doc 017),
# then $0300 -> $02E0 (768 -> 736 B) 2026-06-17 for tone(), then
# $02E0 -> $0200 (736 -> 512 B) 2026-06-17 for abs/sgn/hasPrefix/hasSuffix:
# BSS overlays ONCE and grows up to ($BF00 - __STACKSIZE__), so the C stack
# reserve trades directly against BSS. The doc 017 file/dir builtins added
# ~152 B of name-recognition RODATA, pushing BSS over by 152 B; recovered
# here (256 B reclaimed left ~100 B BSS margin on the II+ Compiler). The
# tone() recognizer row then added ~10 B more RODATA, which tipped the
# tighter //e Compiler (WITH_IIE + WITH_80COL code leaves it less BSS margin
# than the II+ build) over by 5 B; freeing another 32 B here cleared it. The
# abs/sgn + hasPrefix/hasSuffix recognizers (the latter folded into
# try_compile_array_method to share its parse tail, ~40 B vs ~300 B) then
# added ~200 B of CODE/RODATA (II+ over by 199, //e by ~206), recovered by
# this 224 B reclaim. Safe: the
# Compiler is built -Cl (static locals), so recursive descent (pratt) keeps
# almost nothing on the C stack per frame — real high-water is well under
# 528 B, and the source window ($0C00-$1BFF, 4 KB) + bytecode arena
# (1,834 B Tier 1; smaller windows on paged tiers) cap nesting depth
# independently.
SYMBOLS {
    __STACKSIZE__: type = weak, value = $0200;
}
MEMORY {
    ZP:        file = "", define = yes, start = $0080,         size = $001A;
    SWIFTIIZP: file = "", define = yes, start = $00D0,         size = $0010;
    MAIN:      file = %O, define = yes, start = $2000,         size = $BF00 - $2000;
    BSS:       file = "",               start = __ONCE_RUN__,  size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    # Dummy empty LC region: crt0 references __LC_START__/__LC_LAST__ and
    # copies (__LC_LAST__ - __LC_START__) bytes to __LC_START__ at boot.
    # Sized 1 and empty so the copy is a 0-byte no-op; the LC *segment*
    # below runs in MAIN, not here.
    LC:        file = "", define = yes, start = $D400,         size = $0001;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,             type = zp;
    SWIFTIIZP: load = SWIFTIIZP,      type = zp,  optional = yes;
    STARTUP:   load = MAIN,           type = ro;
    LOWCODE:   load = MAIN,           type = ro,  optional = yes;
    CODE:      load = MAIN,           type = ro;
    RODATA:    load = MAIN,           type = ro;
    DATA:      load = MAIN,           type = rw;
    INIT:      load = MAIN,           type = rw;
    # The difference: the compiler's cold code (pratt/statements,
    # tagged `#pragma code-name("LC")`) runs in MAIN, NOT at $D000 — so the
    # LC bank keeps ProDOS's MLI body for file I/O + chaining.
    #
    # LC MUST come BEFORE ONCE: BSS overlays ONCE (start = __ONCE_RUN__) and
    # grows upward to reclaim space; any load-image segment placed after ONCE
    # would sit inside that BSS region and be clobbered at runtime (same trap
    # the launcher cfg documents for its LOADER segment). Placed before ONCE,
    # LC is part of the persistent load image below the BSS reclaim zone.
    LC:        load = MAIN, run = MAIN, type = ro, optional = yes;
    ONCE:      load = MAIN,           type = ro,  define   = yes;
    BSS:       load = BSS,            type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
