# tools/apple2/testrun_sys/testrun.cfg — ld65 config for TESTRUN.SYSTEM, the
# on-target auto-test harness (design doc 018). Modeled on the boot
# launcher's cfg: a ProDOS SYS file at $2000, no EXEHDR, with the same
# $0300 chunked-staging LOADER / LOADER_AUX regions the shared
# boot_launcher_asm.s needs to chain SWIFTSAT / SWIFTAUX. It links that
# same asm (the proven MLI verbs + chain loaders) plus testrun.c, so it
# reuses the launcher's hard-won chain code rather than re-deriving it.
#
# Unlike the launcher it has NO editor, so there is no GAPBUF region; the
# directory block ($0800), parsed entry table ($1400) and MLI I/O buffer
# ($1C00) ride in free RAM below $2000 as raw pokes (not linker segments).

MEMORY {
    ZP:     file = "", define = yes, start = $0080,         size = $001A;
    MAIN:   file = %O, define = yes, start = $2000,         size = $9F00;
    BSS:    file = "",               start = __ONCE_RUN__,  size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    # cc65's apple2 crt0.s references __LC_START__ / __LC_LAST__ (it copies
    # the LC segment at startup). An empty LC region resolves the symbols;
    # nothing here puts anything in the language card.
    LC:     file = "", define = yes, start = $D400,         size = $0001;
    # The SWIFTSAT chunked-staging loader runs at $0300 (main RAM, survives
    # every MLI READ to $2000+); a_install_and_chain_swiftsat memcpys it
    # there at chain time. 256 B is enough for the current loader.
    LOADER: file = "",               start = $0300,         size = $0100;
    # The SWIFTAUX aux park-staging loader also runs at $0300 (overlays
    # LOADER — the SWIFTSAT and SWIFTAUX chain paths are mutually exclusive,
    # one per boot). Its own area so ld65 gives it a distinct MAIN load
    # offset; the aux install fn memcpys it to $0300 at chain time.
    LOADERX: file = "",              start = $0300,         size = $0100;
}
SEGMENTS {
    ZEROPAGE: load = ZP,                 type = zp;
    STARTUP:  load = MAIN,               type = ro;
    LOWCODE:  load = MAIN,               type = ro,  optional = yes;
    CODE:     load = MAIN,               type = ro;
    RODATA:   load = MAIN,               type = ro;
    DATA:     load = MAIN,               type = rw;
    INIT:     load = MAIN,               type = rw;
    # LOADER / LOADER_AUX hold the SWIFTSAT / SWIFTAUX chain loaders; their
    # load-images (in MAIN) must survive until chain time, so they sit BEFORE
    # ONCE (BSS overlays ONCE and grows upward — see the launcher cfg).
    LOADER:   load = MAIN, run = LOADER, type = ro,  optional = yes,  define = yes;
    LOADER_AUX: load = MAIN, run = LOADERX, type = ro, optional = yes, define = yes;
    ONCE:     load = MAIN,               type = ro,  define = yes;
    LC:       load = MAIN, run = LC,     type = ro,  optional = yes;
    BSS:      load = BSS,                type = bss, define = yes;
}
SYMBOLS {
    # BSS-ceiling reservation (the runtime C stack is $BF00 - BSS_top). This
    # tool is small and non-recursive, so the default is ample.
    __STACKSIZE__: type = weak, value = $0800;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}
