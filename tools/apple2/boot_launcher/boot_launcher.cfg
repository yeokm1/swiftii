# tools/apple2/boot_launcher/boot_launcher.cfg — ld65 config for the cc65-built
# SwiftII boot launcher.
#
# Loaded by ProDOS as a SYS file at $2000. No EXEHDR (cc65's stock
# apple2-system.cfg prepends a 58-byte EXEHDR; ProDOS executes that as
# code and traps to the monitor on the first $00 byte — same lesson
# as src/platform/apple2/swiftii-system.cfg).
#
# Layout:
#   $0080-$0099  cc65 ZEROPAGE (cc65 runtime variables)
#   $00A8-$00FF  asm helpers' ZP scratch + ZP bouncer (see boot_launcher_asm.s)
#   $1C00-$1FFF  MLI I/O buffer (passed to MLI OPEN at $1C00, 4 pages)
#   $2000-$BEFF  this binary: STARTUP + CODE + RODATA + DATA + INIT +
#                ONCE, plus BSS at runtime
#   ......$BEFF  BSS ceiling minus C software stack ($0200 by default)
#
# The launcher loads at $2000 and the capability-selected interpreter is
# chained over it (a 40 KB image at $2000), so the launcher itself has the
# whole low-memory window to grow into. As the launcher has grown from a
# tiny boot selector into a full menu + two-pane file browser, the window
# is now opened to its MAXIMUM: $2000-$BEFF, the same ProDOS-SYS ceiling
# ($BF00, just below the global page) the interpreters themselves use —
# 40,704 B. Nothing the launcher uses lives above the file: the directory
# block ($0800), the parsed entry tables ($1400/$1680) and the MLI I/O
# buffer ($1C00) all ride in free RAM below $2000 (see boot_launcher.c),
# not in this window.

MEMORY {
    ZP:     file = "", define = yes, start = $0080,         size = $001A;
    MAIN:   file = %O, define = yes, start = $2000,         size = $9F00;
    BSS:    file = "",               start = __ONCE_RUN__,  size = $BF00 - __STACKSIZE__ - __ONCE_RUN__;
    # cc65's apple2 crt0.s unconditionally references __LC_START__
    # and __LC_LAST__ (it copies the LC segment to the language card
    # at startup). Define an empty LC memory region so the symbols
    # resolve; nothing in this launcher actually puts anything in LC.
    LC:     file = "", define = yes, start = $D400,         size = $0001;
    # SWIFTSAT chunked-staging loader runs
    # at $0300 (main RAM, survives all MLI READs to $2000+). Bytes
    # are assembled for $0300 (run address) but load into MAIN at
    # ld65's choice of offset; the install fn memcpys them at chain
    # time. 256 B is enough for the current loader (~200 B); bump
    # if it grows.
    LOADER: file = "",               start = $0300,         size = $0100;
    # The SWIFTAUX aux park-staging loader also runs at
    # $0300 (it overlays LOADER — the SWIFTSAT and SWIFTAUX chain paths
    # are mutually exclusive, one per boot). Its own memory area so ld65
    # places its bytes at a distinct MAIN load offset; the aux install fn
    # memcpys them to $0300 at chain time.
    LOADERX: file = "",              start = $0300,         size = $0100;
    # Editor merge: the editor's gap buffer (s_text, 3 KB) AND its
    # dirty-diff baseline (s_prev, one ~1.9 KB EditorScreen) both live here, in
    # the low-RAM window the file browser otherwise uses for its directory
    # block ($0800), parsed entry tables ($1400/$1680) and preview ($0C00).
    # s_prev was moved down here when ED_COLS_MAX went to 80: two EditorScreens
    # in high BSS starved cc65's file-I/O heap below the 1 KB ProDOS I/O buffer
    # open() mallocs, so file load/save failed. The browser and the editor are
    # strictly TIME-DISJOINT — editor_main() runs only while file_browser() is
    # blocked on the C stack, and the browser rebuilds those tables
    # (reload_panes) on return — so both may reuse this RAM. s_text + s_prev
    # end below $1BFF, just BELOW the asm MLI I/O buffer at $1C00 the launcher's
    # chain loader uses (and the editor's own cc65 ProDOS I/O buffer rides high,
    # near the C stack), so neither collides. INVARIANT: keep GAPBUF_CAP +
    # sizeof(EditorScreen) <= this region's $1400 (end <= $1C00). The browser's
    # tables are runtime pokes (hard-coded addresses in boot_launcher_asm.s),
    # not linker segments, so ld65 sees no overlap with this file="" region.
    GAPBUF: file = "",               start = $0800,         size = $1400;
}
SEGMENTS {
    ZEROPAGE: load = ZP,                 type = zp;
    STARTUP:  load = MAIN,               type = ro;
    # The editor sources (folded in) emit a LOWCODE segment; map it
    # into MAIN like the other code segments.
    LOWCODE:  load = MAIN,               type = ro,  optional = yes;
    CODE:     load = MAIN,               type = ro;
    RODATA:   load = MAIN,               type = ro;
    DATA:     load = MAIN,               type = rw;
    INIT:     load = MAIN,               type = rw;
    # LOADER / LOADER_AUX hold the SWIFTSAT / SWIFTAUX chain loaders. Their
    # load-images (in MAIN) must survive until chain time, so they MUST be
    # placed BEFORE the ONCE segment: BSS overlays ONCE (the standard cc65
    # space-reclaim), and BSS starting at __ONCE_RUN__ grows upward. If the
    # loaders sit after ONCE they fall inside the BSS overlay and get
    # clobbered once BSS is large enough (the file browser's path
    # buffers pushed BSS past ONCE) — the loader copy to $0300 then runs
    # garbage and crashes at boot. Keeping them below ONCE keeps them out of
    # the BSS region.
    LOADER:   load = MAIN, run = LOADER, type = ro,  optional = yes,  define = yes;
    LOADER_AUX: load = MAIN, run = LOADERX, type = ro, optional = yes, define = yes;
    ONCE:     load = MAIN,               type = ro,  define = yes;
    LC:       load = MAIN, run = LC,     type = ro,  optional = yes;
    BSS:      load = BSS,                type = bss, define = yes;
    # Editor merge: the editor's gap buffer (s_text), placed here
    # via #pragma bss-name("GAPBUF") so it lands in the low-RAM window
    # instead of the merged binary's high BSS (which would push past $BF00).
    GAPBUF:   load = GAPBUF,             type = bss, optional = yes, define = yes;
}
SYMBOLS {
    # $0220 (history: $0200 -> $0400 for the editor merge, when the
    # editor's deeper call paths began sharing the launcher's C stack -> $0300
    # to free 256 B of BSS for the cursor-restore feature -> $0280
    # for the faster WRAP renderer -> $0240 -> $0220 to fund the //e cursor-move
    # fast path's line-start table). This is only the linker's BSS-ceiling
    # RESERVATION; the actual runtime stack is $BF00 - BSS_top, which both builds
    # keep well above the $0200 floor that was historically too small:
    # ~730 B on the II+ build, ~560 B on the //e. The launcher builds with -Cl
    # (static locals) and neither the browser nor the editor recurses, so C-stack
    # use is bounded. BSS ceiling = $BF00 - this.
    __STACKSIZE__: type = weak, value = $0220;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}
